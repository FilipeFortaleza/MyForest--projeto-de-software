{% extends "base.html" %}
{% block content %}
    <h2>Entrar</h2>
    <form method="POST" style="display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: auto;">
        <input type="text" name="username" placeholder="Nome de usuário" required style="padding: 10px;">
        <input type="password" name="password" placeholder="Senha" required style="padding: 10px;">
        <button type="submit" class="btn">Entrar</button>
    </form>
    <p>Ainda não tem conta? <a href="/registro">Registre-se</a></p>
{% endblock %}
