{% extends "base.html" %}
{% block content %}
    <h2>⏳ Modo Foco</h2>
    <div id="config-tempo">
        <label style="font-size: 1.2rem;">Minutos: </label>
        <input type="number" id="input-minutos" value="25" min="1" max="120" style="width: 80px; text-align: center; display: inline-block;">
    </div>
    <h1 id="display" style="font-size: 5rem; color: #2E7D32; margin: 20px 0;">25:00</h1>
    <div>
        <button id="btn-iniciar" class="btn" onclick="startTimer()">▶ Iniciar</button>
        <button id="btn-pausar" class="btn" style="background-color: #F57C00; display: none;" onclick="pauseTimer()">⏸ Pausar</button>
    </div>
    <form id="form-recompensa" action="/timer" method="POST" style="display: none; margin-top: 20px;">
        <input type="hidden" name="duracao" id="input-duracao">
        <p>Sessão concluída com sucesso!</p>
        <button type="submit" class="btn">Reivindicar Planta 🌳</button>
    </form>
    <script>
        let timeRemaining = 0, timerInterval, isRunning = false, isPaused = false;
        const inputMinutos = document.getElementById('input-minutos');
        const display = document.getElementById('display');

        inputMinutos.addEventListener('input', () => {
            if (!isRunning && !isPaused) {
                let mins = parseInt(inputMinutos.value) || 0;
                display.innerText = `${mins.toString().padStart(2, '0')}:00`;
            }
        });

        function startTimer() {
            if (isRunning) return; 
            if (!isPaused) {
                let mins = parseInt(inputMinutos.value) || 25;
                timeRemaining = mins * 60; 
                document.getElementById('input-duracao').value = timeRemaining;
            }
            isRunning = true; isPaused = false;
            document.getElementById('config-tempo').style.display = 'none';
            document.getElementById('btn-iniciar').style.display = 'none';
            document.getElementById('btn-pausar').style.display = 'inline-block';
            
            timerInterval = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    let m = Math.floor(timeRemaining / 60), s = timeRemaining % 60;
                    display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    document.getElementById('btn-pausar').style.display = 'none';
                    document.getElementById('form-recompensa').style.display = 'block';
                }
            }, 1000); 
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false; isPaused = true;
            document.getElementById('btn-pausar').style.display = 'none';
            document.getElementById('btn-iniciar').innerText = '▶ Retomar';
            document.getElementById('btn-iniciar').style.display = 'inline-block';
        }
    </script>
{% endblock %}
