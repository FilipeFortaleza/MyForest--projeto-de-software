{% extends "base.html" %}
{% block content %}
    <h2>Criar Conta</h2>
    <form method="POST" style="max-width: 300px; margin: auto;">
        <input type="text" name="username" placeholder="Escolha um Usuário" required>
        <input type="password" name="password" placeholder="Escolha uma Senha" required>
        <button type="submit" class="btn" style="width: 100%;">Cadastrar</button>
    </form>
    <p>Já tem conta? <a href="/login">Faça Login</a></p>
{% endblock %}
